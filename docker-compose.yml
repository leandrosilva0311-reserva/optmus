services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: optimus
      POSTGRES_USER: optimus
      POSTGRES_PASSWORD: optimus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optimus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_NAME: optimus
      APP_ENV: production
      DATABASE_URL: postgresql://optimus:optimus@postgres:5432/optimus
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AUTH_SESSION_TTL_SECONDS: "3600"
      EXECUTION_LOCK_TTL_SECONDS: "300"
      IDEMPOTENCY_WINDOW_MINUTES: "30"
      RATE_LIMIT_TOOL_PER_MINUTE: "20"
      RATE_LIMIT_PROJECT_PER_MINUTE: "80"
      RATE_LIMIT_TENANT_PER_MINUTE: "120"
      DEFAULT_TENANT_API_KEY: optimus-dev-key
      PROJECT_ROOT: /workspace/optmus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["arq", "optimus_backend.infrastructure.queue.worker.WorkerSettings"]
    environment:
      APP_NAME: optimus
      APP_ENV: production
      DATABASE_URL: postgresql://optimus:optimus@postgres:5432/optimus
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AUTH_SESSION_TTL_SECONDS: "3600"
      EXECUTION_LOCK_TTL_SECONDS: "300"
      IDEMPOTENCY_WINDOW_MINUTES: "30"
      RATE_LIMIT_TOOL_PER_MINUTE: "20"
      RATE_LIMIT_PROJECT_PER_MINUTE: "80"
      RATE_LIMIT_TENANT_PER_MINUTE: "120"
      DEFAULT_TENANT_API_KEY: optimus-dev-key
      PROJECT_ROOT: /workspace/optmus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
